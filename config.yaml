# June 무한매수법 봇 설정. 전략 파라미터의 단일 출처는 CLAUDE.md.
mode: dry-run            # dry-run(모의·기본) | live(실거래). Kraken 은 현물 testnet 없음.
exchange: kraken         # CCXT 거래소 id (Kraken 은 미국 IP 허용 → 무료 US GCP 가능)
symbol: BTC/USDT         # 대안 BTC/USD (유동성↑이나 USDT→USD 환전 필요)

# 전략 (CLAUDE.md §3 고정값)
n: 60                    # 분할 수 (코인 24/7 → 원조 40거래일≈8주 캘린더 커버리지 정합, 2026-06-11)
tp: 0.10                 # 익절 +10% (순수익)
atr_period: 14           # ATR14
x_mult: 1.0              # X = 1 × ATR/price (2026-06-11: 2.0→1.0, 죽은 −X% 트리거 활성화)
x_floor: 0.02            # X 하한 2% (상한 없음)
fallback_hours: 24       # 24h 폴백 시장가

# 잔고변화(입금/출금) 감지 → 40 재분할 (Stage 2.5)
topup_enabled: true                  # 잔고변화 감지·재분할 on/off (마스터 스위치)
topup_threshold: 10                  # 판단 임계 USDT (|미투입현금 변화| 가 이보다 크면 재분할)
topup_immediate_buy_on_deposit: true # 입금 시 재분할 직후 즉시 시장가 1매수 (출금은 축소만)

# 실행
poll_seconds: 30         # 폴링 주기
daily_ohlcv_limit: 150   # ATR 평활용 일봉 개수
taker_fee: 0.004         # Kraken Pro 저볼륨 taker ≈ 0.4% (TP 매도측 손익분기 기준)
slippage: 0.0005         # dry-run/backtest 모의 슬리피지
seed_usdt: 1000          # dry-run 가상 시드 (live 는 거래소 잔고를 사용)

# 운영 안정성 (Stage 2.7 — 라이브니스 하드닝; 모두 선택값, 미기재 시 기본값 적용)
ccxt_timeout_ms: 20000          # ccxt 네트워크 호출 타임아웃 ms (행 방지 1차 방어선)
watchdog_timeout_seconds: 600   # 폴 루프 무박동이 이 시간 초과 시 프로세스 종료→재시작
watchdog_interval_seconds: 15   # 워치독 점검 주기 s
heartbeat_file: data/.heartbeat # 박동 파일(외부 헬스체크 가시성용; data/ 는 .gitignore)

# 영속/운영
state_db: data/june_bot.db
log_file: data/june_bot.log
kill_switch_file: KILL   # 이 파일이 존재하면 봇이 안전 정지

# live 이중 가드 (둘 다 + 환경변수 JUNE_BOT_ALLOW_LIVE=YES_I_UNDERSTAND 필요)
i_understand_live: false

telegram:
  enabled: false         # 토큰/챗ID 는 .env 로 주입
